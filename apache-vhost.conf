# Apache 2 VirtualHost — reverse proxy for the Document & Image Service
#
# Install:
#   1. sudo a2enmod proxy proxy_http headers rewrite
#   2. sudo cp apache-vhost.conf /etc/apache2/sites-available/documents.conf
#   3. Edit ServerName and enable TLS as needed
#   4. sudo a2ensite documents
#   5. sudo systemctl reload apache2
#
# Prerequisites:
#   - documents.service running on 127.0.0.1:8000
#   - DNS A/AAAA record for ServerName

<VirtualHost *:80>
    ServerName files.example.com
    ServerAdmin admin@example.com

    # Redirect all HTTP traffic to HTTPS (recommended for production)
    # Uncomment after obtaining a certificate:
    # RewriteEngine On
    # RewriteCond %{HTTPS} off
    # RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

    ProxyPreserveHost On
    ProxyRequests Off

    # Forward client IP and protocol to Gunicorn/Uvicorn
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s

    # Increase limits to align with MAX_UPLOAD_SIZE (default 50MB)
    LimitRequestBody 52428800

    ProxyPass / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    # Prefer content-length on proxied uploads when available
    SetEnv proxy-sendcl 1

    ErrorLog ${APACHE_LOG_DIR}/documents_error.log
    CustomLog ${APACHE_LOG_DIR}/documents_access.log combined
</VirtualHost>

# Optional TLS VirtualHost (Let's Encrypt / certbot)
#
# <VirtualHost *:443>
#     ServerName files.example.com
#     ServerAdmin admin@example.com
#
#     SSLEngine on
#     SSLCertificateFile      /etc/letsencrypt/live/files.example.com/fullchain.pem
#     SSLCertificateKeyFile   /etc/letsencrypt/live/files.example.com/privkey.pem
#
#     ProxyPreserveHost On
#     ProxyRequests Off
#
#     RequestHeader set X-Forwarded-Proto "https"
#     RequestHeader set X-Real-IP %{REMOTE_ADDR}s
